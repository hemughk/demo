<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Participant Details</title>
    <link rel="stylesheet" th:href="@{/css/loandtls.css}">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script th:src="@{/js/loandtls.js}"></script>
</head>
<body>

<div id="form1">

    <h3>Participant Details</h3>
    <div id="savedPart1Links"></div>

    <form th:action="@{/participants}" th:object="${participant}" method="post">

        <div class="accordion">
            Participant Details
        </div>

        <div class="panel">

            <div class="form-row">
                <input type="text" id="prtcptenttyId" th:field="*{prtcptenttyId}" placeholder="Participant Entity ID">
                <input type="text" id="fulnm" th:field="*{fulnm}" placeholder="Full Name">
                <select id="partytyp" th:field="*{partytyp}">
                    <option value="">Party Type</option>
                    <option value="Debtor">Debtor</option>
                    <option value="Co-obligant">Co-obligant</option>
                    <option value="Guarantor">Guarantor</option>
                </select>
            </div>

            <div class="form-row">
                <input type="text" id="cntrprtycntnm" th:field="*{cntrprtycntnm}" placeholder="Contact Name">
                <input type="text" id="cntrprtycntdsgn" th:field="*{cntrprtycntdsgn}" placeholder="Designation">
                <input type="text" id="cntrprtycntmobno" th:field="*{cntrprtycntmobno}" placeholder="Mobile Number">
            </div>

            <div class="form-row">
                <input type="text" id="altmobno" th:field="*{altmobno}" placeholder="Alternate Mobile">
                <input type="email" id="emlid" th:field="*{emlid}" placeholder="Email">
                <input type="email" id="altemlid" th:field="*{altemlid}" placeholder="Alternate Email">
            </div>

            <div class="form-row">
                <input type="text" id="panno" th:field="*{panno}" placeholder="PAN Number">
                <input type="text" id="signatoryAadhar" th:field="*{signatoryAadhar}" placeholder="Aadhaar Number">
                <select id="signatoryGender" th:field="*{signatoryGender}">
                    <option value="">Gender</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="Other">Other</option>
                </select>
            </div>

            <div class="form-row">
                <input type="text" id="cntrprtyaddr" th:field="*{cntrprtyaddr}" placeholder="Counter Party Address">
                <input type="text" id="comaddr" th:field="*{comaddr}" placeholder="Company Address">
                <input type="text" id="pin" th:field="*{pin}" placeholder="PIN Code">
            </div>

            <div class="form-row">
                <input type="text" id="regoffpin" th:field="*{regoffpin}" placeholder="Registered Office PIN">
                <input type="date" id="doi" th:field="*{doi}">
                <input type="text" id="lglcnstn" th:field="*{lglcnstn}" placeholder="Legal Constitution">
            </div>

            <div class="form-row">
                <input type="text" id="reltocntrct" th:field="*{reltocntrct}" placeholder="Relationship">
                <input type="text" id="ovdtype" th:field="*{ovdtype}" placeholder="OVD Type">
                <input type="text" id="ovdid" th:field="*{ovdid}" placeholder="OVD ID">
            </div>

            <div class="form-row">
                <input type="text" id="cin" th:field="*{cin}" placeholder="CIN">
                <input type="text" id="kin" th:field="*{kin}" placeholder="KIN">
                <input type="number" id="seqno" th:field="*{seqno}" placeholder="Sequence Number">
            </div>

            <div class="form-row">
                <input type="text" id="documentIds" th:field="*{documentIds}" placeholder="Document IDs (Comma Separated)">
            </div>

        </div>

        <br>

        <button id="saveBtn" type="submit">Save</button>
        <button id="clearCache" type="button">clearCache</button>
        <button id="backBtn" type="button">Back</button>

    </form>

</div>

</body>
</html>
